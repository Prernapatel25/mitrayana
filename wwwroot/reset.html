<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mitrayana | Reset Password</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Favicons -->
    <link rel="icon" href="images/favicon_io/favicon.ico" type="image/x-icon">

    <style>
        body {
            font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial;
            background: linear-gradient(135deg, rgba(0, 143, 132, .1), rgba(0, 191, 165, .06));
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .reset-card {
            max-width: 420px;
            width: 100%;
            background: rgba(255, 255, 255, .9);
            backdrop-filter: blur(16px);
            border-radius: 18px;
            padding: 36px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, .08);
        }

        .reset-card h4 {
            font-weight: 800;
            color: #072b28;
        }

        .reset-card p {
            font-size: .95rem;
            color: #6b6b6b;
        }

        .password-wrapper {
            position: relative;
        }

        .toggle-password {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #6b6b6b;
        }

        .form-control {
            height: 52px;
            font-size: 16px;
            /* prevents iOS zoom */
        }

        .btn-teal {
            background: linear-gradient(90deg, #00bfa5, #008080);
            border: none;
            color: #fff;
            font-weight: 700;
            height: 52px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 191, 165, .2);
        }

        .password-hint {
            font-size: .85rem;
            color: #6b6b6b;
        }

        .success-msg {
            display: none;
            background: rgba(0, 191, 165, .12);
            color: #006f6f;
            border-radius: 12px;
            padding: 14px;
            text-align: center;
            font-weight: 600;
        }

        /* Mobile */
        @media (max-width: 576px) {
            body {
                padding: 16px;
                align-items: flex-start;
            }

            .reset-card {
                padding: 28px 22px;
            }

            .reset-card h4 {
                text-align: center;
                font-size: 1.4rem;
            }

            .reset-card p {
                text-align: center;
            }
        }
    </style>
</head>

<body>

    <div class="reset-card">
        <h4 class="mb-2">Reset Password</h4>
        <p class="mb-4">Create a strong new password for your account</p>

        <!-- Success Message -->
        <div id="successMsg" class="success-msg mb-3">
            Password updated successfully. You can now login.
        </div>

        <form id="resetPasswordForm" novalidate>

            <div class="mb-3 password-wrapper">
                <label class="form-label">New Password</label>
                <input type="password" id="newPassword" class="form-control" minlength="6" required>
                <span class="toggle-password" onclick="togglePassword('newPassword')">
                    <i class="bi bi-eye-slash"></i>
                </span>
                <div class="invalid-feedback">
                    Password must be at least 6 characters.
                </div>
            </div>

            <div class="mb-3 password-wrapper">
                <label class="form-label">Confirm Password</label>
                <input type="password" id="confirmPassword" class="form-control" required>
                <span class="toggle-password" onclick="togglePassword('confirmPassword')">
                    <i class="bi bi-eye-slash"></i>
                </span>
                <div class="invalid-feedback">
                    Passwords do not match.
                </div>
            </div>

            <div class="password-hint mb-4">
                Use at least 6 characters. Mix letters & numbers for better security.
            </div>

            <button type="submit" class="btn btn-teal w-100">
                Update Password
            </button>

            <div class="text-center mt-3">
                <a href="login.html" class="text-decoration-none text-muted">
                    Back to Login
                </a>
            </div>
        </form>
    </div>

    <script>
        function togglePassword(id) {
            const input = document.getElementById(id);
            const icon = input.nextElementSibling.querySelector("i");
            if (input.type === "password") {
                input.type = "text";
                icon.classList.remove("bi-eye-slash");
                icon.classList.add("bi-eye");
            } else {
                input.type = "password";
                icon.classList.remove("bi-eye");
                icon.classList.add("bi-eye-slash");
            }
        }

        // Parse query params for token & email
        const params = new URLSearchParams(window.location.search);
        const token = params.get('token');
        const email = params.get('email');

        if (!token || !email) {
            alert('Missing reset token or email in the link.');
        }

        document.getElementById("resetPasswordForm").addEventListener("submit", async function (e) {
            e.preventDefault();

            const password = newPassword.value;
            const confirm = confirmPassword.value;

            if (password.length < 6) {
                newPassword.classList.add("is-invalid");
                return;
            } else {
                newPassword.classList.remove("is-invalid");
            }

            if (password !== confirm) {
                confirmPassword.classList.add("is-invalid");
                return;
            } else {
                confirmPassword.classList.remove("is-invalid");
            }

            try {
                const BASE_API = (typeof API_URL !== 'undefined') ? API_URL : 'http://localhost:5500';
                const res = await fetch(BASE_API + '/api/Auth/reset', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, token, newPassword: password })
                });

                const data = await res.json();
                if (res.ok) {
                    document.getElementById("successMsg").style.display = "block";
                    setTimeout(() => { window.location.href = 'login.html'; }, 1500);
                } else {
                    alert(data?.message || 'Failed to reset password');
                }
            } catch (ex) {
                console.error(ex);
                alert('Cannot connect to server. Please try again later.');
            }
        });

    </script>

   
    <script src="js/app.js"></script>

</body>

</html>
