<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Feedback - Mitrayana</title>
    <link rel="icon" type="image/x-icon" href="images/favicon_io/favicon.ico">
    <link rel="stylesheet" href="/css/site.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
  </head>
  <body>
    <nav class="nav">
      <div class="nav-content">
        <div class="brand">
          <i class="fas fa-heart"></i>
          Mitrayana
        </div>
        <div class="links">
          <a href="/">Home</a>
          <a href="/feedback.html" class="active">Feedback</a>
          <div id="authLinks">
            <a href="/login.html" class="btn-link">Login</a>
            <a href="/register.html" class="btn">Register</a>
          </div>
        </div>
      </div>
    </nav>

    <main class="container" style="margin-top: 5rem;">
      <section class="cards" style="margin: 2rem 0;">
        <div class="card">
          <h2>Share Your Experience</h2>
          <form id="feedbackForm">
            <label for="message">Message</label>
            <textarea id="message" name="message" rows="4" required placeholder="Tell us about your experience..."></textarea>
            
            <label for="rating">Rating</label>
            <div class="rating" style="margin: 1rem 0;">
              <select id="rating" name="rating" required>
                <option value="5">5 - Excellent</option>
                <option value="4">4 - Very Good</option>
                <option value="3">3 - Good</option>
                <option value="2">2 - Fair</option>
                <option value="1">1 - Poor</option>
              </select>
            </div>

            <button type="submit" class="btn">Submit Feedback</button>
          </form>
        </div>

        <div class="card">
          <h2>Recent Feedback</h2>
          <div id="feedbackList">Loading...</div>
        </div>
      </section>
    </main>

    <footer class="footer">
      <div class="container">
        <div class="footer-content">
          <div class="footer-brand">
            <i class="fas fa-heart"></i>
            Mitrayana
          </div>
          <div class="footer-links">
            <a href="/">Home</a>
            <a href="/feedback.html">Feedback</a>
            <a href="/login.html">Login</a>
            <a href="/register.html">Register</a>
          </div>
        </div>
        <div class="footer-bottom">
          © 2025 Mitrayana. All rights reserved.
        </div>
      </div>
    </footer>

    <script src="/js/app.js"></script>
    <script>
      document.addEventListener('DOMContentLoaded', async () => {
        const form = document.getElementById('feedbackForm');
        const list = document.getElementById('feedbackList');
        const token = localStorage.getItem('token');
        const authLinks = document.getElementById('authLinks');

        // Update auth links if logged in
        if (token) {
          const role = localStorage.getItem('role');
          authLinks.innerHTML = `
            <a href="login.html">Dashboard</a>
            <a href="#" onclick="app.logout()" class="btn-link">Logout</a>
          `;
        }

        // Handle form submit
        form.addEventListener('submit', async (e) => {
          e.preventDefault();
          if (!token) {
            alert('Please login to submit feedback');
            window.location.href = '/login.html';
            return;
          }

          const message = document.getElementById('message').value;
          const rating = document.getElementById('rating').value;
          
          try {
            const res = await app.submitFeedback(message, parseInt(rating));
            if (!res) {
              alert('Failed to submit feedback: Unknown error');
              return;
            }
            alert('Thank you for your feedback!');
            form.reset();
            loadFeedback();
          } catch (error) {
            console.error('Feedback submission error:', error);
            alert('Failed to submit feedback: ' + error.message);
          }
        });

        // Load feedback list
        async function loadFeedback() {
          list.innerText = 'Loading...';
          const items = await app.getFeedbacks();
          if (!items || items.length === 0) {
            list.innerText = 'No feedback yet.';
            return;
          }

          list.innerHTML = items.map(f => `
            <div style="padding:1rem 0;border-bottom:1px solid var(--teal-light)">
              <div style="margin-bottom:0.5rem">${f.message}</div>
              <div style="color:var(--gray);font-size:0.9rem">
                Rating: ${'⭐'.repeat(f.rating)}
              </div>
            </div>
          `).join('');
        }

        loadFeedback();
      });


    </script>

    <!-- Scroll to Top Button -->
    <button id="scrollToTopBtn" class="scroll-to-top" onclick="topFunction()">↑</button>

  </body>
</html>
